<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>妙言</title>
  </head>
  <body>
    <script>
      // Sync theme before first paint to prevent white flash
      (function() {
        try {
          var s = JSON.parse(localStorage.getItem('miaoyan_settings') || '{}');
          var mode = s.appearance || 'system';
          var dark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          document.documentElement.style.background = dark ? '#23282D' : '#ffffff';
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
